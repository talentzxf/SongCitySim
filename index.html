<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>永宋千秋 · 城筑天下</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #080501; }

      /* ── Pre-React splash ─────────────────────────────────────────── */
      #pre-splash {
        position: fixed; inset: 0; z-index: 99999;
        background: #080501;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 28px;
        font-family: "Noto Serif SC", "SimSun", "STSong", serif;
        transition: opacity 0.6s ease;
      }
      #pre-splash.hide { opacity: 0; pointer-events: none; }

      .ps-title {
        text-align: center;
        line-height: 1.25;
      }
      .ps-title-main {
        display: block;
        font-size: clamp(36px, 6vw, 64px);
        font-weight: 900;
        letter-spacing: 0.35em;
        color: #f5e4be;
        text-shadow: 0 0 40px rgba(210,160,60,0.5), 0 2px 8px rgba(0,0,0,0.9);
      }
      .ps-title-sub {
        display: block;
        font-size: clamp(18px, 2.8vw, 36px);
        font-weight: 700;
        letter-spacing: 0.5em;
        color: #d4a85a;
        text-shadow: 0 0 24px rgba(190,140,50,0.4), 0 2px 6px rgba(0,0,0,0.9);
        margin-top: 4px;
      }

      /* Decorative divider */
      .ps-divider {
        width: clamp(120px, 18vw, 220px);
        height: 1px;
        background: linear-gradient(to right, transparent, rgba(200,160,60,0.5), transparent);
      }

      /* Spinner */
      .ps-spinner-wrap {
        display: flex; flex-direction: column; align-items: center; gap: 14px;
      }
      .ps-spinner {
        width: 36px; height: 36px;
        border: 2px solid rgba(190,150,70,0.25);
        border-top-color: #c8a030;
        border-radius: 50%;
        animation: ps-spin 0.9s linear infinite;
      }
      .ps-hint {
        color: rgba(190,160,100,0.55);
        font-size: clamp(11px, 1.1vw, 13px);
        letter-spacing: 0.4em;
      }

      /* Animated dots after the hint text */
      .ps-dots::after {
        content: '';
        animation: ps-dots 1.5s steps(4, end) infinite;
      }
      @keyframes ps-dots {
        0%   { content: ''; }
        25%  { content: '.'; }
        50%  { content: '..'; }
        75%  { content: '...'; }
        100% { content: ''; }
      }
      @keyframes ps-spin { to { transform: rotate(360deg); } }

      /* Corner version tag */
      .ps-ver {
        position: absolute; bottom: 14px; right: 18px;
        color: rgba(160,140,100,0.3);
        font-size: 10px; letter-spacing: 0.1em;
        font-family: monospace;
      }
    </style>
  </head>
  <body>
    <!-- Pre-React loading splash — removed by React after first render -->
    <div id="pre-splash">
      <div class="ps-title">
        <span class="ps-title-main">永宋千秋</span>
        <span class="ps-title-sub">城筑天下</span>
      </div>
      <div class="ps-divider"></div>
      <div class="ps-spinner-wrap">
        <div class="ps-spinner"></div>
        <div class="ps-hint"><span class="ps-dots">筹备中</span></div>
      </div>
      <div class="ps-ver">Early Access</div>
    </div>

    <div id="root"></div>
    <script>
      // ensure E2E hook exists early to avoid race conditions
      try {
        window.__CITY_STATE__ = { buildings: [], roads: [] }
        window.__GET_CITY_STATE__ = () => window.__CITY_STATE__
      } catch (e) {}
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
